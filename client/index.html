<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Multiplayer</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center font-sans">

    <!-- Container Principal -->
    <div id="app" class="w-full max-w-md p-6 bg-gray-800 rounded-xl shadow-2xl border border-gray-700">
        
        <!-- Cabeçalho -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-blue-500 tracking-tighter">TIC-TAC-TOE</h1>
            <p class="text-gray-400 mt-2">Multiplayer em Tempo Real</p>
        </header>

        <!-- Tela de Entrada -->
        <div id="lobby" class="space-y-6">
            <div class="space-y-4">
                <input id="inputPlayerName" type="text" placeholder="Seu Nome" class="w-full bg-gray-700 border border-gray-600 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                
                <button id="btnCreate" class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold transition-all transform hover:scale-105">
                    CRIAR NOVA SALA
                </button>
                <div class="flex items-center space-x-2">
                    <input id="inputRoomId" type="text" placeholder="Código da Sala" class="flex-1 bg-gray-700 border border-gray-600 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
                    <button id="btnJoin" class="px-6 py-3 bg-green-600 hover:bg-green-700 rounded-lg font-bold transition-all">
                        ENTRAR
                    </button>
                </div>
            </div>
            <p id="lobbyMessage" class="text-center text-sm text-gray-500"></p>
        </div>

        <!-- Tela de Jogo (Oculta por padrão) -->
        <div id="gameScreen" class="hidden space-y-6">
            <div class="flex justify-between items-center text-sm font-semibold mb-4">
                <div id="playerSymbol" class="px-3 py-1 bg-blue-900 text-blue-200 rounded-full">Símbolo: ?</div>
                <div id="roomCode" class="text-gray-400">Sala: #XXXXXX</div>
            </div>

            <div id="playersInfo" class="flex justify-around text-sm text-gray-300 mb-2">
                <div id="playerXName">X: Aguardando...</div>
                <div id="playerOName">O: Aguardando...</div>
            </div>

            <div id="status" class="text-center py-2 bg-gray-700 rounded-lg font-medium text-blue-400">
                Aguardando oponente...
            </div>

            <!-- Tabuleiro -->
            <div id="board" class="grid grid-cols-3 gap-3 bg-gray-700 p-3 rounded-xl shadow-inner border-2 border-gray-600">
                <div data-index="0" class="cell flex items-center justify-center h-24 bg-gray-800 rounded-lg text-5xl font-bold cursor-pointer hover:bg-gray-700 transition-colors"></div>
                <div data-index="1" class="cell flex items-center justify-center h-24 bg-gray-800 rounded-lg text-5xl font-bold cursor-pointer hover:bg-gray-700 transition-colors"></div>
                <div data-index="2" class="cell flex items-center justify-center h-24 bg-gray-800 rounded-lg text-5xl font-bold cursor-pointer hover:bg-gray-700 transition-colors"></div>
                <div data-index="3" class="cell flex items-center justify-center h-24 bg-gray-800 rounded-lg text-5xl font-bold cursor-pointer hover:bg-gray-700 transition-colors"></div>
                <div data-index="4" class="cell flex items-center justify-center h-24 bg-gray-800 rounded-lg text-5xl font-bold cursor-pointer hover:bg-gray-700 transition-colors"></div>
                <div data-index="5" class="cell flex items-center justify-center h-24 bg-gray-800 rounded-lg text-5xl font-bold cursor-pointer hover:bg-gray-700 transition-colors"></div>
                <div data-index="6" class="cell flex items-center justify-center h-24 bg-gray-800 rounded-lg text-5xl font-bold cursor-pointer hover:bg-gray-700 transition-colors"></div>
                <div data-index="7" class="cell flex items-center justify-center h-24 bg-gray-800 rounded-lg text-5xl font-bold cursor-pointer hover:bg-gray-700 transition-colors"></div>
                <div data-index="8" class="cell flex items-center justify-center h-24 bg-gray-800 rounded-lg text-5xl font-bold cursor-pointer hover:bg-gray-700 transition-colors"></div>
            </div>

            <button id="btnLeave" class="w-full py-2 text-gray-400 hover:text-red-400 text-sm font-medium">Sair da Sala</button>
        </div>

    </div>

    <!-- Scripts -->
    <script src="js/communication/socket.js"></script>
    <script src="js/presentation/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
